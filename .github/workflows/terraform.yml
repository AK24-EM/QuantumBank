###############################################################################
# QuantumBank — Terraform CI/CD Pipeline
#
# Active region: ap-south-1 (Primary / only region currently configured)
#
# Triggers:
#   - PR opened/updated  → terraform plan  (posts result as PR comment)
#   - Push to main       → terraform apply (auto-deploys ap-south-1)
#   - Manual dispatch    → choose action: plan | apply | destroy
#
# GitHub Secrets required (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#
# GitHub Environment required (Settings → Environments):
#   production-ap-south-1
###############################################################################

name: "Terraform Infrastructure CI/CD"

on:
  push:
    branches:
      - main
    paths:
      - "infrastructure/**"
  pull_request:
    branches:
      - main
    paths:
      - "infrastructure/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION:       "1.8.5"
  AWS_REGION:       "ap-south-1"
  TF_CLI_ARGS:      "-no-color"
  TF_STATE_BUCKET:  "quantumbank-terraform-state"
  TF_LOCK_TABLE:    "quantumbank-terraform-locks"
  TF_STATE_REGION:  "ap-south-1"
  TF_WORKING_DIR:   "infrastructure/environments/ap-south-1"

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ###########################################################################
  # JOB 1: Validate & Format Check (no AWS credentials required)
  ###########################################################################
  validate:
    name: "✅ Validate Terraform"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive infrastructure/
        continue-on-error: true

      - name: Comment format issues on PR
        if: steps.fmt.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Terraform Format Check Failed**\n\nRun `terraform fmt -recursive infrastructure/` locally to fix formatting before merging.'
            })

      - name: Terraform Init (validation only — no backend)
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} validate

  ###########################################################################
  # JOB 2: Plan — runs on PRs and manual plan dispatch
  ###########################################################################
  plan:
    name: "🔍 Plan — ap-south-1"
    runs-on: ubuntu-latest
    needs: validate
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=environments/ap-south-1/terraform.tfstate" \
            -backend-config="region=${{ env.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"

      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} \
            plan -out=ap-south-1.tfplan \
            -detailed-exitcode 2>&1 | tee /tmp/plan-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload Plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-ap-south-1
          path: ${{ env.TF_WORKING_DIR }}/ap-south-1.tfplan
          retention-days: 7

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan-output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.slice(0, 60000) + '\n\n...(truncated)'
              : plan;
            const exitCode = '${{ steps.plan.outputs.exitcode }}';
            const status = exitCode === '0' ? '✅ No changes'
                         : exitCode === '2' ? '⚠️ Changes pending'
                         : '❌ Plan failed';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🏗️ Terraform Plan — \`ap-south-1\`\n**Status:** ${status}\n<details><summary>Full Plan Output</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n</details>`
            })

      - name: Fail job if plan errored
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "Terraform plan returned exit code 1 (error). See plan output above."
          exit 1

  ###########################################################################
  # JOB 3: Apply — runs on push to main OR manual apply dispatch
  ###########################################################################
  apply:
    name: "🚀 Apply — ap-south-1"
    runs-on: ubuntu-latest
    needs: validate
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment:
      name: production-ap-south-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Release orphaned Terraform state lock
        continue-on-error: true
        run: |
          LOCK_ID="${{ env.TF_STATE_BUCKET }}/environments/ap-south-1/terraform.tfstate"
          EXISTING=$(aws dynamodb get-item \
            --table-name "${{ env.TF_LOCK_TABLE }}" \
            --region "${{ env.TF_STATE_REGION }}" \
            --key "{\"LockID\":{\"S\":\"${LOCK_ID}\"}}" \
            --query 'Item.LockID.S' --output text 2>/dev/null || echo "")
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "None" ]; then
            echo "Orphaned lock found — clearing: ${LOCK_ID}"
            aws dynamodb delete-item \
              --table-name "${{ env.TF_LOCK_TABLE }}" \
              --region "${{ env.TF_STATE_REGION }}" \
              --key "{\"LockID\":{\"S\":\"${LOCK_ID}\"}}"
          else
            echo "No orphaned lock found. Proceeding."
          fi

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=environments/ap-south-1/terraform.tfstate" \
            -backend-config="region=${{ env.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"

      - name: Terraform Plan
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} \
            plan -out=ap-south-1.tfplan

      - name: Terraform Apply
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} \
            apply -auto-approve ap-south-1.tfplan

      - name: Deployment summary
        if: always()
        run: |
          echo "## 🇮🇳 ap-south-1 Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          terraform -chdir=${{ env.TF_WORKING_DIR }} output 2>/dev/null >> $GITHUB_STEP_SUMMARY || true

  ###########################################################################
  # JOB 4: Destroy — manual dispatch only, requires environment approval gate
  ###########################################################################
  destroy:
    name: "💣 Destroy — ap-south-1"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment:
      name: production-ap-south-1   # reuses same env — approval gate still applies

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=environments/ap-south-1/terraform.tfstate" \
            -backend-config="region=${{ env.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"

      - name: Terraform Destroy
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} \
            destroy -auto-approve
