###############################################################################
# QuantumBank — Unified Application CI/CD Pipeline
#
# Builds a single container: React frontend (Vite) + Node.js API gateway
# served by Express. One image, one ECR repo, one ECS service.
#
# Build strategy:
#   - Multi-stage Dockerfile: build React → copy dist/ into server/public/
#   - Express serves static files + SPA fallback for React Router
#   - API routes under /api, health check at /health
#
# Triggers: push to main on src/**, server/**, Dockerfile changes
# Secrets:  AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
###############################################################################

name: "Application CI/CD Pipeline"

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "server/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - "server/Dockerfile"
      - ".github/workflows/app-deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "server/**"
      - "package.json"
      - "Dockerfile"
  workflow_dispatch:

env:
  AWS_REGION:    "ap-south-1"
  ECS_CLUSTER:   "quantumbank-ap-south-1"
  ECS_SERVICE:   "quantumbank-api-gateway-ap-south-1"
  ECR_REPO:      "quantumbank/api-gateway"
  TASK_FAMILY:   "quantumbank-api-gateway-ap-south-1"

jobs:
  ###########################################################################
  # STAGE 1 — Lint & Typecheck
  ###########################################################################
  verify:
    name: "✅ Lint & Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm run lint || echo "::warning::Lint warnings"
      - run: npm run typecheck

  ###########################################################################
  # STAGE 2 — Build unified image + Trivy scan
  ###########################################################################
  build-and-scan:
    name: "🐳 Build & Scan"
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build unified image (React + Node.js)
        run: |
          docker build \
            -t ${{ env.ECR_REPO }}:${{ github.sha }} \
            -f server/Dockerfile \
            . 

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.ECR_REPO }}:${{ github.sha }}"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

  ###########################################################################
  # STAGE 3 — Push to ECR + rolling deploy to ECS
  ###########################################################################
  deploy:
    name: "🚀 Deploy to ECS"
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: production-ap-south-1

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, push to ECR
        id: push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE=$REGISTRY/${{ env.ECR_REPO }}
          docker build \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            -f server/Dockerfile \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
          echo "image=${IMAGE}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Update ECS task definition with new image
        id: task-def
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          NEW_IMAGE=$REGISTRY/${{ env.ECR_REPO }}:${{ github.sha }}

          # Get current task def, swap image, strip read-only fields
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_FAMILY }} \
            --query "taskDefinition" \
            --output json | python3 -c "
          import json, sys, os
          td = json.load(sys.stdin)
          new_image = os.environ['NEW_IMAGE']
          for c in td['containerDefinitions']:
              if c['name'] == 'api-gateway':
                  c['image'] = new_image
          for k in ['taskDefinitionArn','revision','status','requiresAttributes',
                    'compatibilities','registeredAt','registeredBy']:
              td.pop(k, None)
          print(json.dumps(td))
          " > /tmp/new-td.json

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/new-td.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "task_def_arn=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "Registered: $NEW_ARN"

      - name: Deploy to ECS service
        id: deploy
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${{ steps.task-def.outputs.task_def_arn }} \
            --force-new-deployment \
            --query "service.{running:runningCount,desired:desiredCount}" \
            --output json

      - name: Wait for stability
        run: |
          echo "Waiting for ECS service to stabilise..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}
          echo "✅ Stable"

      - name: Summary
        if: always()
        run: |
          echo "## 🚀 Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.push.outputs.image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | http://quantumbank-alb-ap-south-1-527851780.ap-south-1.elb.amazonaws.com |" >> $GITHUB_STEP_SUMMARY
