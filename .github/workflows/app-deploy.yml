###############################################################################
# QuantumBank — Application CI/CD Pipeline
#
# Deploys the React frontend to ECS Fargate via ECR.
# The frontend is a fully self-contained static app served by Nginx.
# Backend (server/) is not yet present — pipeline scoped to client only.
#
# Triggers:
#   - Push to main (src/** or Dockerfile changes) → build + deploy
#   - PR to main → build + scan only (no deploy)
#
# Secrets required:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
###############################################################################

name: "Application CI/CD Pipeline"

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".github/workflows/app-deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "Dockerfile"

env:
  AWS_REGION:   "ap-south-1"
  ECS_CLUSTER:  "quantumbank-ap-south-1"
  ECS_SERVICE:  "quantumbank-api-gateway-ap-south-1"
  CLIENT_REPO:  "quantumbank/client"

jobs:
  ###########################################################################
  # STAGE 1 — Lint, Typecheck
  ###########################################################################
  verify:
    name: "✅ Lint & Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || echo "::warning::Lint warnings found"

      - name: Typecheck
        run: npm run typecheck

  ###########################################################################
  # STAGE 2 — Docker build + Trivy security scan
  ###########################################################################
  build-and-scan:
    name: "🐳 Build & Security Scan"
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build client image
        run: docker build -t ${{ env.CLIENT_REPO }}:${{ github.sha }} -f Dockerfile .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ env.CLIENT_REPO }}:${{ github.sha }}"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Trivy SARIF upload
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ env.CLIENT_REPO }}:${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-client
        continue-on-error: true

  ###########################################################################
  # STAGE 3 — Push to ECR + deploy to ECS (main branch only)
  ###########################################################################
  deploy:
    name: "🚀 Push to ECR & Deploy to ECS"
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production-ap-south-1

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI=$REGISTRY/${{ env.CLIENT_REPO }}
          docker build \
            -t $IMAGE_URI:${{ github.sha }} \
            -t $IMAGE_URI:latest \
            -f Dockerfile .
          docker push $IMAGE_URI:${{ github.sha }}
          docker push $IMAGE_URI:latest
          echo "image_uri=${IMAGE_URI}:${{ github.sha }}" >> $GITHUB_OUTPUT
        id: push

      - name: Update ECS task definition with new image
        id: task-def
        run: |
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition quantumbank-api-gateway-${{ env.AWS_REGION }} \
            --query "taskDefinition" 2>/dev/null || echo "null")

          if [ "$TASK_DEF" = "null" ]; then
            echo "::warning::Task definition not found. ECS service will pick up :latest on next deploy."
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            # Register new revision with updated image
            NEW_DEF=$(echo $TASK_DEF | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          new_image = '${{ steps.login-ecr.outputs.registry }}/${{ env.CLIENT_REPO }}:${{ github.sha }}'
          for c in td['containerDefinitions']:
              if c['name'] == 'api-gateway':
                  c['image'] = new_image
          # Remove fields not accepted by register-task-definition
          for k in ['taskDefinitionArn','revision','status','requiresAttributes',
                    'compatibilities','registeredAt','registeredBy']:
              td.pop(k, None)
          print(json.dumps(td))
          ")
            NEW_ARN=$(aws ecs register-task-definition \
              --cli-input-json "$NEW_DEF" \
              --query "taskDefinition.taskDefinitionArn" --output text)
            echo "task_def_arn=$NEW_ARN" >> $GITHUB_OUTPUT
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to ECS service
        id: deploy-ecs
        run: |
          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query "services[0].status" --output text 2>/dev/null || echo "MISSING")

          if [ "$SERVICE_STATUS" = "ACTIVE" ]; then
            ARGS="--cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }}"

            if [ "${{ steps.task-def.outputs.updated }}" = "true" ]; then
              ARGS="$ARGS --task-definition ${{ steps.task-def.outputs.task_def_arn }}"
            fi

            aws ecs update-service $ARGS --force-new-deployment
            echo "deployed=true" >> $GITHUB_OUTPUT
            echo "✅ ECS deployment triggered"
          else
            echo "::warning::ECS service ${{ env.ECS_SERVICE }} not ACTIVE (status: $SERVICE_STATUS). Infrastructure may not be fully provisioned."
            echo "deployed=false" >> $GITHUB_OUTPUT
          fi

      - name: Wait for deployment stability
        if: steps.deploy-ecs.outputs.deployed == 'true'
        run: |
          echo "Waiting for ECS service to stabilise..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}
          echo "✅ Service stable"

      - name: Deployment summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.CLIENT_REPO }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.AWS_REGION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | ${{ env.ECS_CLUSTER }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed | ${{ steps.deploy-ecs.outputs.deployed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
