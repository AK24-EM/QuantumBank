###############################################################################
# QuantumBank — Application CI/CD
# Builds unified image (React + Node.js), pushes to ECR, deploys to ECS.
###############################################################################

name: "Application CI/CD Pipeline"

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "server/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - "server/Dockerfile"
      - "nginx.conf"
      - ".github/workflows/app-deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION:  "ap-south-1"
  ECS_CLUSTER: "quantumbank-ap-south-1"
  ECS_SERVICE: "quantumbank-api-gateway-ap-south-1"
  ECR_REPO:    "quantumbank/api-gateway"
  TASK_FAMILY: "quantumbank-api-gateway-ap-south-1"

jobs:
  ###########################################################################
  # STAGE 1 — Typecheck only (fast gate)
  ###########################################################################
  typecheck:
    name: "✅ Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  ###########################################################################
  # STAGE 2 — Build + Push to ECR + Deploy to ECS
  ###########################################################################
  deploy:
    name: "🚀 Build, Push & Deploy"
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: production-ap-south-1

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push to ECR
        id: push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE=$REGISTRY/${{ env.ECR_REPO }}
          docker build \
            -t $IMAGE:${{ github.sha }} \
            -f server/Dockerfile \
            .
          docker push $IMAGE:${{ github.sha }}
          echo "image=$IMAGE:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Register new task definition
        id: task-def
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          NEW_IMAGE=$REGISTRY/${{ env.ECR_REPO }}:${{ github.sha }}

          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_FAMILY }} \
            --query "taskDefinition" \
            --output json | python3 -c "
          import json, sys, os
          td = json.load(sys.stdin)
          for c in td['containerDefinitions']:
              if c['name'] == 'api-gateway':
                  c['image'] = os.environ['NEW_IMAGE']
          for k in ['taskDefinitionArn','revision','status','requiresAttributes',
                    'compatibilities','registeredAt','registeredBy']:
              td.pop(k, None)
          print(json.dumps(td))
          " > /tmp/new-td.json

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/new-td.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)
          echo "task_def_arn=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "Registered: $NEW_ARN"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${{ steps.task-def.outputs.task_def_arn }} \
            --force-new-deployment \
            --query "service.{running:runningCount,desired:desiredCount}" \
            --output json

      - name: Wait for stability
        run: |
          echo "Waiting for ECS to stabilise..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}
          echo "✅ Deployed and stable"

      - name: Summary
        if: always()
        run: |
          echo "## Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.push.outputs.image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | http://quantumbank-alb-ap-south-1-527851780.ap-south-1.elb.amazonaws.com |" >> $GITHUB_STEP_SUMMARY
